<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="24" x2="1540" y2="498" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04110A"/>
      <stop offset="0.54" stop-color="#0A2016"/>
      <stop offset="1" stop-color="#123425"/>
      <animate attributeName="x1" values="60;120;60" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1540;1480;1540" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1190 120) rotate(90) scale(190 280)">
      <stop stop-color="#54F7A0" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#54F7A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 370) rotate(90) scale(180 280)">
      <stop stop-color="#1B8C58" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#1B8C58" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#93FFC7" stroke-opacity="0.08" shape-rendering="crispEdges"/>
    </pattern>
    <pattern id="pixels" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#B1FFD4" fill-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" rx="36" fill="#020605"/>
  <rect x="18" y="18" width="1564" height="484" rx="26" fill="url(#bg)"/>
  <rect x="18" y="18" width="1564" height="484" rx="26" fill="url(#pixels)"/>
  <rect x="18" y="18" width="1564" height="484" rx="26" fill="url(#grid)"/>
  <ellipse cx="1190" cy="130" rx="240" ry="170" fill="url(#glowA)" filter="url(#blur)">
    <animate attributeName="cx" values="1190;1130;1190" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="320" cy="370" rx="230" ry="160" fill="url(#glowB)" filter="url(#blur)">
    <animate attributeName="cx" values="320;390;320" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <g opacity="0.75">
    <path d="M72 404C216 342 338 325 466 365C602 408 696 424 838 377C985 328 1158 287 1530 343" stroke="#8AFFBE" stroke-opacity="0.13" stroke-width="2.5"/>
    <path d="M72 378C224 314 360 300 493 343C628 387 711 393 855 349C1003 304 1170 264 1532 315" stroke="#D8FFE9" stroke-opacity="0.42" stroke-width="2"/>
  </g>

  <g>
    <rect x="72" y="72" width="270" height="40" rx="20" fill="#B1FFD4" fill-opacity="0.08" stroke="#B1FFD4" stroke-opacity="0.18"/>
    <circle cx="98" cy="92" r="5" fill="#54F7A0">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="116" y="98" fill="#D8FFE9" font-family="Courier New, monospace" font-size="15" letter-spacing="2">ONLINE / BUILDING / SHIPPING</text>
  </g>

  <g fill="#E8FFF2">
    <text x="74" y="212" font-family="Courier New, monospace" font-size="88" font-weight="700" letter-spacing="-2">YO, I'M</text>
    <text x="74" y="304" font-family="Courier New, monospace" font-size="116" font-weight="700" letter-spacing="-4">AMIRLAN</text>
  </g>

  <g fill="#9FD8B7">
    <text x="79" y="370" font-family="Courier New, monospace" font-size="24" letter-spacing="1.5">15 y/o cto &amp; co-founder @ extensy</text>
  </g>

  <g opacity="0.98">
    <rect x="1066" y="272" width="420" height="150" rx="26" fill="#C6FFDF" fill-opacity="0.08" stroke="#C6FFDF" stroke-opacity="0.16"/>
    <rect x="1086" y="292" width="380" height="110" rx="18" fill="#07120D" filter="url(#glass)"/>
    <text x="1116" y="330" fill="#89F8B5" font-family="Courier New, monospace" font-size="18" letter-spacing="2">CURRENT BUILD</text>
    <text x="1116" y="374" fill="#ECFFF5" font-family="Courier New, monospace" font-size="44" font-weight="700">EXTENSY</text>
    <text x="1116" y="397" fill="#96CFAE" font-family="Courier New, monospace" font-size="17">describe what you want - get the extension</text>
  </g>

  <rect x="-210" y="0" width="120" height="520" fill="#FFFFFF" fill-opacity="0.08" transform="rotate(8)">
    <animateTransform attributeName="transform" type="translate" values="0 0;1900 0" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
