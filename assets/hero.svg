<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="170" y1="52" x2="1452" y2="442" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE5"/>
      <stop offset="0.42" stop-color="#E5D5C0"/>
      <stop offset="1" stop-color="#C08A5A"/>
      <animate attributeName="x1" values="170;240;170" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1452;1360;1452" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1220 140) rotate(90) scale(170 240)">
      <stop stop-color="#F9F3EC" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F9F3EC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 386) rotate(90) scale(160 260)">
      <stop stop-color="#8C5A35" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8C5A35" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" stroke="#161616" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" rx="36" fill="#121212"/>
  <rect x="18" y="18" width="1564" height="484" rx="26" fill="url(#bg)"/>
  <rect x="18" y="18" width="1564" height="484" rx="26" fill="url(#grid)"/>
  <ellipse cx="1210" cy="144" rx="240" ry="170" fill="url(#glowA)" filter="url(#blur)">
    <animate attributeName="cx" values="1210;1150;1210" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="310" cy="370" rx="230" ry="160" fill="url(#glowB)" filter="url(#blur)">
    <animate attributeName="cx" values="310;380;310" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <g opacity="0.78">
    <path d="M70 405C220 336 334 328 460 366C604 410 694 421 834 374C989 321 1139 279 1536 347" stroke="#111111" stroke-opacity="0.25" stroke-width="2.5"/>
    <path d="M70 376C226 308 358 303 489 344C630 387 707 393 853 347C1004 300 1167 260 1538 318" stroke="#FBF7F0" stroke-opacity="0.62" stroke-width="2"/>
  </g>

  <g>
    <rect x="72" y="72" width="212" height="34" rx="17" fill="#171717" fill-opacity="0.92"/>
    <circle cx="96" cy="89" r="5" fill="#E7A56A">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="114" y="95" fill="#F3EEE5" font-family="Arial, Helvetica, sans-serif" font-size="14" letter-spacing="2.4">FOUNDER / ENGINEER / SHIPPER</text>
  </g>

  <g fill="#141414">
    <text x="74" y="220" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="700" letter-spacing="-3">BUILD FAST.</text>
    <text x="74" y="318" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="700" letter-spacing="-3">STAY SHARP.</text>
  </g>

  <g fill="#27211D">
    <text x="79" y="380" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1.5">personal README reworked as a moving poster for amirlan</text>
  </g>

  <g opacity="0.95">
    <rect x="1098" y="286" width="390" height="130" rx="20" fill="#171717"/>
    <text x="1128" y="330" fill="#F3EEE5" font-family="Arial, Helvetica, sans-serif" font-size="18" letter-spacing="2">CURRENT SIGNAL</text>
    <text x="1128" y="377" fill="#DAB28A" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">EXTENSY</text>
    <text x="1267" y="377" fill="#7D766F" font-family="Arial, Helvetica, sans-serif" font-size="18">browser tools in motion</text>
  </g>

  <rect x="-210" y="0" width="180" height="520" fill="#FFFFFF" fill-opacity="0.19" transform="rotate(8)">
    <animateTransform attributeName="transform" type="translate" values="0 0;1900 0" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
