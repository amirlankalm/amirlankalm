<svg width="640" height="420" viewBox="0 0 640 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="52" y1="36" x2="552" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161616"/>
      <stop offset="1" stop-color="#2A241F"/>
    </linearGradient>
    <linearGradient id="bar" x1="76" y1="0" x2="516" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4EEE5"/>
      <stop offset="1" stop-color="#C78955"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" rx="28" fill="url(#panel)"/>
  <rect x="28" y="28" width="584" height="364" rx="20" stroke="#F4EEE5" stroke-opacity="0.14"/>

  <text x="54" y="82" fill="#F4EEE5" font-family="Arial, Helvetica, sans-serif" font-size="16" letter-spacing="2.8">LIVE STATUS</text>
  <text x="54" y="132" fill="#C68E5D" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">shipping mode</text>

  <g>
    <rect x="54" y="174" width="532" height="20" rx="10" fill="#3C362F"/>
    <rect x="54" y="174" width="324" height="20" rx="10" fill="url(#bar)">
      <animate attributeName="width" values="220;472;324;418;324" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g fill="#8B8178" font-family="Arial, Helvetica, sans-serif" font-size="15" letter-spacing="1.4">
    <text x="54" y="238">focus_01</text>
    <text x="54" y="278">focus_02</text>
    <text x="54" y="318">focus_03</text>
  </g>

  <g fill="#F4EEE5" font-family="Arial, Helvetica, sans-serif" font-size="23">
    <text x="190" y="238">browser extension generation</text>
    <text x="190" y="278">fast product execution</text>
    <text x="190" y="318">taste-driven interfaces</text>
  </g>

  <circle cx="541" cy="94" r="11" fill="#D59A64">
    <animate attributeName="r" values="11;15;11" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;1;0.55" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
